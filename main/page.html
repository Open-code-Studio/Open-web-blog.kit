<!DOCTYPE html>
<html lang="zh-Hans" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Web Blog - 文章</title>
  <meta name="description" content="阅读博客文章">

  <link rel="preconnect" href="https://fonts.loli.net">
  <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">

  <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/markdown.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/nav.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark-dimmed.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" defer></script>
</head>
<body class="has-floating-nav">

  <!-- Floating Nav Bar -->
  <nav class="floating-nav" id="floatingNav">
    <a href="index.html" class="floating-nav__brand">
      <span class="floating-nav__brand-icon">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="var(--md-sys-color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </span>
      <span class="floating-nav__brand-name">Open Web Blog</span>
    </a>
    <span class="floating-nav__divider"></span>
    <div class="floating-nav__links">
      <a href="index.html" class="floating-nav__link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        首页
      </a>
      <a href="page.html" class="floating-nav__link active">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        文章
      </a>
      <a href="link.html" class="floating-nav__link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        友链
      </a>
      <a href="about.html" class="floating-nav__link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        关于
      </a>
    </div>
    <span class="floating-nav__divider"></span>
    <div class="floating-nav__end">
      <button class="icon-button" id="menuToggle" aria-label="打开文章列表">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
      <button class="icon-button" id="themeToggle" aria-label="切换主题">
        <svg viewBox="0 0 24 24" width="24" height="24" id="themeIcon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <!-- Drawer Overlay -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <!-- Sidebar Navigation (only on page.html) -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar__header">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="var(--md-sys-color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </div>
      <div class="brand-text">
        <span class="brand-name">Open Web Blog</span>
        <span class="brand-subtitle">博客</span>
      </div>
    </div>
    <div class="sidebar__section-label">文章列表</div>
    <ul class="nav-list" id="navList">
      <!-- Dynamic -->
    </ul>
    <div class="sidebar__footer" id="sidebarLinks"></div>
  </nav>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <div class="content-wrapper">
      <article class="doc-article" id="docArticle">
        <div class="doc-header" id="docHeader">
          <h1 class="doc-title" id="docTitle">选择一篇文章</h1>
          <div class="doc-meta" id="docMeta"></div>
        </div>
        <div class="doc-body markdown-body" id="docBody">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            <h3>欢迎阅读</h3>
            <p>请从左侧文章列表选择一篇文章开始阅读</p>
          </div>
        </div>
      </article>
      <aside class="toc-sidebar" id="tocSidebar">
        <div class="toc-header">目录</div>
        <ul class="toc-list" id="tocList"></ul>
      </aside>
    </div>

    <footer class="blog-footer">
      <p>Built with ❤️ using Material Design 3</p>
    </footer>
  </main>

  <button class="fab" id="scrollTop" aria-label="回到顶部">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
  </button>

  <script src="js/page.js"></script>
</body>
</html>
