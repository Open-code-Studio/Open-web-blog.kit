<!DOCTYPE html>
<html lang="zh-Hans" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Web Blog - 友链</title>
  <meta name="description" content="友情链接">

  <link rel="preconnect" href="https://fonts.loli.net">
  <link rel="preconnect" href="https://gstatic.loli.net" crossorigin>

  <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/nav.css">

  <style>
    .page-container { max-width: 800px; margin: 0 auto; padding: 0 20px 60px; }
    .page-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: var(--md-sys-color-on-surface); }
    .page-desc { color: var(--md-sys-color-on-surface-variant); margin-bottom: 32px; line-height: 1.6; }
    .link-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
    .link-card {
      display: flex; align-items: center; gap: 14px; padding: 18px 20px;
      border-radius: var(--md-sys-shape-large); background-color: var(--md-sys-color-surface-container-low);
      border: 1px solid var(--md-sys-color-outline-variant); text-decoration: none;
      transition: all 0.2s ease;
    }
    .link-card:hover { background-color: var(--md-sys-color-surface-container); border-color: var(--md-sys-color-primary); transform: translateY(-2px); box-shadow: var(--md-sys-elevation-2); text-decoration: none; }
    .link-card__avatar {
      width: 48px; height: 48px; border-radius: var(--md-sys-shape-medium);
      background: linear-gradient(135deg, var(--md-sys-color-primary-container), var(--md-sys-color-tertiary-container));
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .link-card__avatar svg { width: 24px; height: 24px; color: var(--md-sys-color-primary); }
    .link-card__info { min-width: 0; }
    .link-card__name { font-size: 15px; font-weight: 600; color: var(--md-sys-color-on-surface); }
    .link-card__desc { font-size: 13px; color: var(--md-sys-color-on-surface-variant); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    @media (max-width: 768px) {
      .link-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="has-floating-nav">

  <nav class="floating-nav" id="floatingNav">
    <a href="index.html" class="floating-nav__brand">
      <span class="floating-nav__brand-icon">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="var(--md-sys-color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </span>
      <span class="floating-nav__brand-name">Open Web Blog</span>
    </a>
    <span class="floating-nav__divider"></span>
    <div class="floating-nav__links">
      <a href="index.html" class="floating-nav__link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        首页
      </a>
      <a href="page.html" class="floating-nav__link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        文章
      </a>
      <a href="link.html" class="floating-nav__link active">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        友链
      </a>
      <a href="about.html" class="floating-nav__link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        关于
      </a>
    </div>
    <span class="floating-nav__divider"></span>
    <div class="floating-nav__end">
      <button class="icon-button" id="themeToggle" aria-label="切换主题">
        <svg viewBox="0 0 24 24" width="24" height="24" id="themeIcon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </nav>

  <main class="main-content main-content--full">
    <div class="page-container">
      <h1 class="page-title" id="linksTitle">🔗 友情链接</h1>
      <p class="page-desc" id="linksDesc">加载中...</p>
      <div class="link-grid" id="linkGrid">
        <!-- Dynamically populated from config.json -->
      </div>
    </div>

    <footer class="blog-footer">
      <p>Built with ❤️ using Material Design 3</p>
    </footer>
  </main>

  <script src="js/theme.js"></script>
  <script>
    (function() {
      const icons = {
        github: '<path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>',
        code: '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>',
        design: '<polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/>',
        home: '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
        book: '<path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>',
        globe: '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>'
      };
      fetch('config.json').then(r => r.json()).then(cfg => {
        const links = cfg.links;
        if (!links) return;
        if (links.title) document.getElementById('linksTitle').textContent = links.title;
        if (links.description) document.getElementById('linksDesc').textContent = links.description;
        const items = links.items || [];
        document.getElementById('linkGrid').innerHTML = items.map(item => `
          <a href="${item.url}" target="_blank" rel="noopener" class="link-card">
            <div class="link-card__avatar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[item.icon] || icons.globe}</svg>
            </div>
            <div class="link-card__info">
              <div class="link-card__name">${item.name}</div>
              <div class="link-card__desc">${item.desc || ''}</div>
            </div>
          </a>
        `).join('');
      }).catch(() => {});
    })();
  </script>
</body>
</html>
