<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="关于本站">

  <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    .page-container { max-width: 680px; margin: 0 auto; padding: 0 20px; }
    .page-title { font-size: 2rem; font-weight: 700; margin-bottom: 8px; color: var(--md-sys-color-on-surface); }
    .page-desc { color: var(--md-sys-color-on-surface-variant); margin-bottom: 32px; line-height: 1.6; }
    .about-card {
      padding: 24px 28px; border-radius: var(--md-sys-shape-large);
      background-color: var(--md-sys-color-surface-container-low);
      border: 1px solid var(--md-sys-color-outline-variant); margin-bottom: 16px;
    }
    .about-card h3 { font-size: 1.05rem; font-weight: 600; margin-bottom: 8px; color: var(--md-sys-color-on-surface); }
    .about-card p { font-size: 14px; color: var(--md-sys-color-on-surface-variant); line-height: 1.7; }
    .tech-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .tech-tag {
      padding: 4px 12px; border-radius: var(--md-sys-shape-full);
      background-color: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container);
      font-size: 12px; font-weight: 500;
    }
  </style>
</head>
<body class="has-floating-nav">

          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        </svg>
      </span>
      <span class="floating-nav__brand-name">Open Web Blog</span>
    </a>
    <span class="floating-nav__divider"></span>
    <div class="floating-nav__links">
      <span class="nav-slider"></span>
      <a href="index.html" class="floating-nav__link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        首页

      <a href="page.html" class="floating-nav__link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        文章

      <a href="moment.html" class="floating-nav__link">

        瞬间

      <a href="link.html" class="floating-nav__link">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>

        关于

      <button class="icon-button" id="themeToggle" aria-label="切换主题">
        <svg viewBox="0 0 24 24" width="24" height="24" id="themeIcon" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>

  <main class="main-content main-content--full">
    <div class="page-container" id="aboutContent">
      <h1 class="page-title">📖 关于本站</h1>
      <p class="page-desc" id="aboutDesc">加载中...</p>
      <div id="aboutCards">
        <!-- Dynamically populated from config.json -->
      </div>
    </div>

    <footer class="blog-footer">
      <p>Built with ❤️ using Material Design 3</p>
    </footer>
  </main>

  <script src="js/transitions.js"></script>
  <script src="js/extensions.js"></script>
  <script src="js/lightbox.js"></script>
  <script>
    (function() {
      const themeToggle = document.getElementById('themeToggle');
      const themeIcon = document.getElementById('themeIcon');
      function getPreferredTheme() {
        const stored = localStorage.getItem('owb-theme');
        if (stored) return stored;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('owb-theme', theme);
        const isDark = theme === 'dark';
        if (themeIcon) themeIcon.innerHTML = isDark
          ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
          : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      }
      setTheme(getPreferredTheme());
      themeToggle.addEventListener('click', () => {
        const html = document.documentElement;
        html.classList.add('transitioning');
        setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        setTimeout(() => html.classList.remove('transitioning'), 300);
      });
    })();
  </script>
  <script>
    (function() {
      // Load about content from config.json
      fetch('config.json').then(r => r.json()).then(cfg => {
        const about = cfg.about;
        if (!about) {
          document.getElementById('aboutDesc').textContent = '一个简约、优雅的开源技术博客，基于 Material Design 3 构建。';
          return;
        }
        // Description
        if (about.description) {
          document.getElementById('aboutDesc').textContent = about.description;
        }
        // Cards
        const cardsContainer = document.getElementById('aboutCards');
        if (!about.sections || !about.sections.length) {
          cardsContainer.innerHTML = '<div class="about-card"><h3>关于</h3><p>暂无更多信息。</p></div>';
          return;
        }
        cardsContainer.innerHTML = about.sections.map(section => {
          let bodyHtml = '';
          if (section.text) {
            bodyHtml = `<p>${section.text}</p>`;
          }
          if (section.tags && section.tags.length) {
            bodyHtml += '<div class="tech-tags">' + section.tags.map(t => `<span class="tech-tag">${t}</span>`).join('') + '</div>';
          }
          if (section.links && section.links.length) {
            bodyHtml += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px">' +
              section.links.map(l => `<a href="${l.url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:9999px;background:var(--md-sys-color-surface-container-high);color:var(--md-sys-color-primary);font-size:13px;text-decoration:none;transition:all 0.2s" onmouseover="this.style.background='var(--md-sys-color-primary-container)'" onmouseout="this.style.background='var(--md-sys-color-surface-container-high)'">
                <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                ${l.label}
              </a>`).join('') + '</div>';
          }
          return `<div class="about-card">
            <h3>${section.title}</h3>
            ${bodyHtml}
          </div>`;
        }).join('');
      }).catch(() => {
        document.getElementById('aboutDesc').textContent = '一个简约、优雅的开源技术博客。';
      });
    })();
  </script>
</body>
</html>
