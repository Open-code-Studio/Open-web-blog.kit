<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0;url=main/index.html">
  <title>Open Web Blog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: #121212;
      color: #E4E2DF;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      text-align: center;
    }
    .box h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #7FC8F8, #4AA26F);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .box p {
      color: #C8C5C2;
      margin-bottom: 16px;
    }
    .box a {
      color: #7FC8F8;
      text-decoration: none;
      font-weight: 500;
    }
    .box a:hover {
      text-decoration: underline;
    }
  </style>
  <link href="https://fonts.loli.net/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="box">
    <h1>Open Web Blog</h1>
    <p>正在前往 Open Web Blog 主页…</p>
    <a href="main/index.html">如果没有自动跳转，请点击这里</a>
  </div>
</body>
</html>
